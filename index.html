<style>
:root{
  color-scheme: dark;
  --bg:#f4f7fb;
  --shell:#edf2ff;
  --panel:#071227;
  --panel-deep:#08152d;
  --blue:#2d7dff;
  --blue-2:#4f96ff;
  --blue-3:#7cc1ff;
  --text:#f5f8ff;
  --muted:#c5d0e6;
  --muted-2:#97a7c2;
  --border:rgba(255,255,255,.08);
  --shadow:0 26px 70px rgba(3,8,18,.24);
  --radius:28px;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100vh;
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 50% 0%, rgba(45,125,255,.10), transparent 22%),
    linear-gradient(180deg, #f7f9fd 0%, #eef3fb 100%);
  color:var(--text);
  overflow-x:hidden;
  overflow-y:auto;
}

.page{
  display:block;
  padding:16px 16px 0;
}

.hero{
  position:relative;
  width:min(1200px, 100%);
  min-height:auto;
  border-radius:36px;
  overflow:hidden;
  background:
    radial-gradient(circle at 18% 18%, rgba(58,118,255,.22), transparent 28%),
    radial-gradient(circle at 90% 10%, rgba(92,170,255,.18), transparent 17%),
    radial-gradient(circle at 76% 88%, rgba(52,144,255,.30), transparent 30%),
    linear-gradient(135deg, #09112a 0%, #071427 45%, #0b1d3f 100%);
  box-shadow:var(--shadow);
  border:1px solid rgba(11,31,61,.08);
  display:flex;
  align-items:stretch;
  isolation:isolate;
  margin:0 auto;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 82% 74%, rgba(69,150,255,.35), transparent 18%),
    radial-gradient(circle at 92% 82%, rgba(114,195,255,.18), transparent 11%),
    linear-gradient(135deg, rgba(255,255,255,.02), transparent 34%);
  pointer-events:none;
  animation:aurora 24s ease-in-out infinite alternate;
}

.hero::after{
  content:"";
  position:absolute;
  right:-80px;
  bottom:-120px;
  width:360px;
  height:360px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(64,140,255,.60), rgba(64,140,255,0) 66%);
  filter:blur(8px);
  opacity:.75;
  animation:float 10s ease-in-out infinite;
  pointer-events:none;
}

.content{
  position:relative;
  z-index:1;
  width:100%;
  display:grid;
  grid-template-columns:minmax(0,1.12fr) minmax(0,.88fr);
  gap:24px;
  padding:32px 34px 68px;
}

.left{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  gap:36px;
  padding:4px 0 4px 4px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:39px;
  height:39px;
  flex:none;
  transition:filter .24s ease, transform .24s ease;
}

.brand:hover .logo{
  filter:drop-shadow(0 0 12px rgba(89,169,255,.22));
  transform:scale(1.015);
}

.brand-copy{
  display:grid;
  gap:2px;
}

.brand-name{
  font-size:20px;
  line-height:1;
  font-weight:800;
  letter-spacing:-0.04em;
}

.brand-sub{
  font-size:11px;
  letter-spacing:.38em;
  text-transform:uppercase;
  color:rgba(233,240,255,.60);
}

.headline{
  margin:0;
  font-size:clamp(41px, 4.9vw, 67px);
  line-height:.92;
  letter-spacing:-0.07em;
  max-width:10ch;
}

.headline .accent{
  display:block;
  background:linear-gradient(135deg, #53a2ff 0%, #7cc4ff 55%, #a9ddff 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.subtext{
  margin:0;
  max-width:44ch;
  font-size:clamp(15px, 1.22vw, 18px);
  line-height:1.72;
  color:rgba(234,241,255,.92);
  text-align:center;
}

.actions{
  display:flex;
  flex-direction:column;
  gap:12px;
  align-items:flex-start;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:11px;
  width:fit-content;
  padding:12px 16px;
  border-radius:999px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(125,169,255,.18);
  color:#eff5ff;
  font-size:13px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.badge svg{
  flex:none;
}

.cta-row{
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}

.cta{
  position:relative;
  border:0;
  border-radius:16px;
  padding:17px 25px;
  min-width:220px;
  background:linear-gradient(135deg, #2d7dff 0%, #4f8fff 52%, #78c4ff 100%);
  color:white;
  font:inherit;
  font-size:15px;
  font-weight:800;
  letter-spacing:-0.02em;
  cursor:pointer;
  box-shadow:0 18px 36px rgba(45,125,255,.34), inset 0 1px 0 rgba(255,255,255,.18);
  overflow:hidden;
  transition:transform .24s ease, box-shadow .24s ease, filter .24s ease;
}

.cta:hover{
  transform:scale(1.02);
  box-shadow:0 22px 46px rgba(45,125,255,.40), 0 0 18px rgba(91,167,255,.28), 0 0 0 1px rgba(123,196,255,.22), inset 0 1px 0 rgba(255,255,255,.2);
  filter:saturate(1.08);
}

.cta:focus-visible{
  outline:3px solid rgba(123,196,255,.35);
  outline-offset:3px;
}

.cta .label,
.cta .loading{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:opacity .18s ease, transform .18s ease;
}

.cta .loading{
  position:absolute;
  inset:0;
  opacity:0;
  transform:translateY(6px);
}

.cta.is-loading .label{
  opacity:0;
  transform:translateY(-6px);
}

.cta.is-loading .loading{
  opacity:1;
  transform:translateY(0);
}

.spinner{
  width:16px;
  height:16px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  animation:spin .8s linear infinite;
}

.time{
  display:flex;
  align-items:center;
  gap:10px;
  color:rgba(229,236,251,.82);
  font-size:13px;
  font-weight:700;
}

.time svg{
  flex:none;
  color:#67afff;
}

.footer{
  margin-top:10px;
  color:rgba(215,226,245,.66);
  font-size:12px;
  letter-spacing:.01em;
  display:flex;
  align-items:center;
  gap:0;
  white-space:nowrap;
}

.reveal{
  opacity:0;
  transform:translateY(18px);
  animation:reveal .9s cubic-bezier(.16,1,.3,1) forwards;
}

.right{
  position:relative;
  display:flex;
  align-items:flex-end;
  justify-content:flex-end;
  min-height:0;
}

.dots{
  position:absolute;
  top:14px;
  right:4px;
  width:128px;
  height:82px;
  background-image:
    radial-gradient(circle, rgba(130,193,255,.85) 1.2px, transparent 1.3px);
  background-size:16px 16px;
  opacity:.52;
  mask-image:linear-gradient(180deg, rgba(0,0,0,1), rgba(0,0,0,.15));
}

.glow{
  position:absolute;
  right:-36px;
  bottom:-38px;
  width:270px;
  height:270px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(58,128,255,.56), rgba(58,128,255,0) 66%);
  filter:blur(14px);
  opacity:.8;
  animation:float2 12s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(-8px,-10px,0) scale(1.03)}
}

@keyframes float2{
  0%,100%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(-10px,-12px,0) scale(1.06)}
}

@keyframes aurora{
  0%{transform:translate3d(0,0,0) scale(1);opacity:.88}
  100%{transform:translate3d(-1.5%,1.5%,0) scale(1.03);opacity:1}
}

@keyframes reveal{
  to{opacity:1;transform:translateY(0)}
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

@media (max-width: 900px){
  body{overflow:auto}
  .page{padding:10px}
  .hero{
    border-radius:28px;
  }
  .content{
    grid-template-columns:1fr;
    padding:24px 24px 68px;
  }
  .right{
    min-height:0;
  }
  .headline{
    max-width:12ch;
  }
}

@media (max-width: 640px){
  .hero{
  }
  .content{
    padding:20px 20px 64px;
    gap:18px;
  }
  .brand-name{
    font-size:18px;
  }
  .brand-sub{
    letter-spacing:.28em;
  }
  .headline{
    font-size:clamp(38px, 11vw, 50px);
  }
  .subtext{
    font-size:15px;
  }
  .cta-row{
    gap:12px;
  }
  .cta{
    width:100%;
  }
  .time{
    font-size:12px;
  }
}

@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{
    animation-duration:.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.01ms !important;
    scroll-behavior:auto !important;
  }
}
</style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Event discovery landing page">
      <div class="content">
        <div class="left">
          <header class="brand" aria-label="M.N Solutions">
            <div class="logo" aria-hidden="true">
              <svg viewBox="0 0 64 64" width="34" height="34" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="logoGrad" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#2D7DFF"/>
                    <stop offset="1" stop-color="#79C0FF"/>
                  </linearGradient>
                </defs>
                <path d="M12 47V17l20-11 20 11v30L32 58 12 47Z" stroke="url(#logoGrad)" stroke-width="3" stroke-linejoin="round"/>
                <path d="M22 43V21h5.7l7.3 11.5L42.3 21H48v22h-5.2V31.2L35.2 42h-2.4l-7.7-10.8V43H22Z" fill="#F8FBFF"/>
              </svg>
            </div>
            <div class="brand-copy">
              <div class="brand-name">M.N Solutions</div>
              <div class="brand-sub">Digital Solutions</div>
            </div>
          </header>

          <div class="actions">
            <h1 class="headline reveal">
              Let's Build Your
              <span class="accent">Event Experience</span>
            </h1>
            <p class="subtext reveal" style="animation-delay:.08s">
              Thank you for your interest.
            </p>
            <div class="badge reveal" style="animation-delay:.14s">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M3 5.5h12M5 3v5M13 3v5M4.4 8.5h9.2A1.4 1.4 0 0 1 15 9.9v4.6a1.4 1.4 0 0 1-1.4 1.4H4.4A1.4 1.4 0 0 1 3 14.5V9.9a1.4 1.4 0 0 1 1.4-1.4Z" stroke="#59A9FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              EVENT MANAGEMENT SYSTEM
            </div>
            <p class="subtext reveal" style="max-width:42ch;animation-delay:.18s">
              Complete our Discovery Questionnaire so we can prepare your Technical Proposal, Project Timeline and Commercial Quotation.
            </p>

            <div class="cta-row reveal" style="animation-delay:.22s">
              <button class="cta" id="startBtn" type="button" aria-label="Start Discovery">
                <span class="label">
                  Start Discovery &rarr;
                </span>
                <span class="loading">
                  <span class="spinner" aria-hidden="true"></span>
                  Preparing...
                </span>
              </button>
              <div class="time" aria-label="Estimated time">
                <span aria-hidden="true">⏱</span>
                5-7 Minutes
              </div>
            </div>
          </div>

          <div class="footer reveal" style="animation-delay:.28s">
            Powered by M.N Solutions
          </div>
        </div>

        <div class="right" aria-hidden="true">
          <div class="dots"></div>
          <div class="glow"></div>
        </div>
      </div>
    </section>
  </main>

<script>
(function(){
  var DESTINATION_URL = 'https://script.google.com/macros/s/AKfycbzk7u5NAbSXiKzGandcYoi0wJv5cdR_KI_-Lt8JDiL4afPMEJT5IFqtQDw5zI6CEz7keg/exec';
  var button = document.getElementById('startBtn');
  var loading = false;

  function addRipple(event){
    var rect = button.getBoundingClientRect();
    var ripple = document.createElement('span');
    var size = Math.max(rect.width, rect.height);
    var hasPointer = event && typeof event.clientX === 'number' && typeof event.clientY === 'number';
    var x = hasPointer ? event.clientX - rect.left - size / 2 : rect.width / 2 - size / 2;
    var y = hasPointer ? event.clientY - rect.top - size / 2 : rect.height / 2 - size / 2;

    ripple.style.position = 'absolute';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    ripple.style.width = size + 'px';
    ripple.style.height = size + 'px';
    ripple.style.borderRadius = '50%';
    ripple.style.background = 'rgba(255,255,255,.24)';
    ripple.style.transform = 'scale(0)';
    ripple.style.pointerEvents = 'none';
    ripple.style.transition = 'transform 650ms cubic-bezier(.16,1,.3,1), opacity 700ms ease';
    ripple.style.opacity = '1';

    button.appendChild(ripple);

    requestAnimationFrame(function(){
      ripple.style.transform = 'scale(1)';
      ripple.style.opacity = '0';
    });

    setTimeout(function(){
      if (ripple && ripple.parentNode) ripple.parentNode.removeChild(ripple);
    }, 750);
  }

  function startDiscovery(event){
    if (loading) return;
    loading = true;
    addRipple(event);
    button.classList.add('is-loading');
    button.setAttribute('aria-busy', 'true');
    button.disabled = true;

    setTimeout(function(){
      window.location.href = DESTINATION_URL;
    }, 800);
  }

  button.addEventListener('click', startDiscovery);
  button.addEventListener('keydown', function(event){
    if ((event.key === 'Enter' || event.key === ' ') && !loading) {
      event.preventDefault();
      startDiscovery(event);
    }
  });
})();
</script>
</body>
</html>
